<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{font-family:Arial,sans-serif;background:#f7f8fb;margin:0}.container{max-width:1000px;margin:0 auto;padding:24px}.shell{display:grid;grid-template-columns:240px 1fr;gap:16px}.nav a{display:block;padding:8px;border-radius:6px;text-decoration:none}.active{background:#e8edff}.card{background:white;padding:14px;border:1px solid #dde2ef;border-radius:10px}.notice{background:#fff8e6;padding:8px;border-left:4px solid #c57a00}.empty{padding:16px;border:1px dashed #bcc7e2;border-radius:8px;text-align:center}.muted{color:#667085}</style></head><body><main class="container"><h1>Scheduling money surface</h1><p>Separated from host/account billing shell by route and domain boundary.</p></main>
<script>let dirty=false;const form=document.getElementById('billing-form');if(form){form.addEventListener('input',()=>dirty=true);window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}})}</script>
</body></html>
